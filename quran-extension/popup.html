<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quran Concordance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="popup.css" />
</head>

<body>

    <!-- Blurred background image -->
    <div class="bg-overlay"></div>

    <div class="container">

        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">☾</span>
                <div>
                    <h1 class="logo-title">Quran Concordance</h1>
                    <p class="logo-sub">Search the Holy Quran</p>
                </div>
            </div>
        </header>

        <!-- Search Bar -->
        <div class="search-wrapper">
            <div class="search-box">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <input type="text" id="search-input" placeholder="e.g. mercy, prayer, light, patience..."
                    autocomplete="off" />
                <button id="search-btn">Search</button>
            </div>
        </div>

        <!-- Frequency Badge -->
        <div id="freq-display" class="freq-display hidden">
            <span id="freq-text"></span>
        </div>

        <!-- Error Message -->
        <div id="error-display" class="error-display hidden"></div>

        <!-- Loading Spinner -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Searching the Holy Quran…</p>
        </div>

        <!-- Results List -->
        <div id="results-container" class="results-container"></div>

        <!-- Pagination hint -->
        <div id="pagination-info" class="pagination-info hidden"></div>

    </div>

    <script src="popup.js"></script>
</body>

</html>
